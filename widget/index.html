<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmileCare AI Agent Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #f3f4f6;
            color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            background: #fff;
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #4b5563;
            margin-bottom: 24px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #ecfdf5;
            color: #059669;
            border-radius: 999px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: currentColor;
            border-radius: 50%;
        }

        .instruction {
            margin-top: 32px;
            font-size: 0.9rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status">Ворклоу Активен</div>
        <h1>SmileCare AI Agent</h1>
        <p>Добро пожаловать на страницу тестирования вашего стоматологического ИИ-ассистента. Нажмите на иконку в углу, чтобы начать чат.</p>
        
        <div class="instruction">
            Настроено для клиники: <strong>Стоматология "Жемчужная Улыбка"</strong><br>
            Webhook: auto.amz-creator.com
        </div>
    </div>

    <!-- Chatbot Widget Script -->
    <script src="chatbot-widget.js"></script>
</body>
</html>
